<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Live Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">
  <div class="app-container">
    <!-- Sidebar for History -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Chats History</h2>
        <div class="sidebar-search">
          <input type="text" id="search-history" placeholder="Search chats..." autocomplete="off">
        </div>
      </div>
      <div class="sidebar-content" id="history-list">
        <!-- Dynamically populated by db.js -->
      </div>
      <div class="sidebar-footer">
        <span>Built late at night by Damindu 🌙</span>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Toolbar -->
      <header class="toolbar">
        <div class="toolbar-left">
          <button id="btn-toggle-sidebar" class="icon-btn sidebar-toggle-btn" title="Toggle Sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
          </button>
          <span class="topic-title" id="current-topic">Loading...</span>
        </div>
        <div class="toolbar-right">
          <label class="switch-container" title="Enable/Disable AI Live Viewer">
            <span class="switch-label">Live Sync</span>
            <input type="checkbox" id="extension-toggle" checked>
            <span class="slider"></span>
          </label>
          <div class="divider"></div>
          <button id="btn-zoom-out" class="icon-btn" title="Zoom Out">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="8" x2="14" y1="11" y2="11"/></svg>
          </button>
          <button id="btn-zoom-in" class="icon-btn" title="Zoom In">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></svg>
          </button>
          <button id="btn-theme" class="icon-btn" title="Toggle Light/Dark Theme">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          </button>
          <div class="divider"></div>
          <button id="btn-settings" class="icon-btn" title="Settings">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <div class="divider"></div>
          <button id="btn-export-pdf" class="btn primary">PDF</button>
          <button id="btn-export-doc" class="btn secondary">DOC</button>
        </div>
      </header>

      <!-- Settings Modal -->
      <div id="settings-modal" class="modal">
        <div class="modal-content">
          <div class="modal-header">
            <h2>Settings</h2>
            <button id="close-settings" class="icon-btn close-btn">✕</button>
          </div>
          <div class="modal-body">
            <section class="settings-section">
              <h3>General</h3>
              <div class="setting-item">
                <label>Auto-scroll to bottom</label>
                <input type="checkbox" id="setting-autoscroll" checked>
              </div>
              <div class="setting-item">
                <label>Font Size (px)</label>
                <input type="number" id="setting-fontsize" min="12" max="30" value="16">
              </div>
              <div class="setting-item">
                <label>Code Block Theme</label>
                <select id="setting-codetheme">
                  <option value="default">Default Dark</option>
                  <option value="monokai">Monokai</option>
                  <option value="github">GitHub Light</option>
                </select>
              </div>
              <div class="setting-item">
                <label>Auto-save to PDF on finish</label>
                <input type="checkbox" id="setting-autopdf">
              </div>
              <div class="setting-item">
                <label>Auto-copy to Clipboard on finish</label>
                <input type="checkbox" id="setting-autocopy">
              </div>
              <div class="setting-item">
                <label>Font Family</label>
                <select id="setting-fontfamily">
                  <option value="sans">Sans-serif (Modern)</option>
                  <option value="serif">Serif (Classic)</option>
                  <option value="mono">Monospace (Code)</option>
                </select>
              </div>
              <div class="setting-item">
                <label>Render Mode</label>
                <select id="setting-rendermode">
                  <option value="rich">Rich Text (HTML)</option>
                  <option value="plain">Plain Text (Markdown)</option>
                </select>
              </div>
            </section>

            <section class="settings-section">
              <h3>Sites (Enable/Disable)</h3>
              <div class="setting-item">
                <label>ChatGPT</label>
                <input type="checkbox" id="site-chatgpt" checked>
              </div>
              <div class="setting-item">
                <label>Gemini</label>
                <input type="checkbox" id="site-gemini" checked>
              </div>
              <div class="setting-item">
                <label>Claude</label>
                <input type="checkbox" id="site-claude" checked>
              </div>
              <div class="setting-item">
                <label>DeepSeek</label>
                <input type="checkbox" id="site-deepseek" checked>
              </div>
            </section>

            <section class="settings-section advanced">
              <h3>Advanced</h3>
              <div class="setting-item vertical">
                <label>Custom CSS</label>
                <textarea id="setting-customcss" placeholder="/* Add your custom CSS here */"></textarea>
              </div>
              <div class="setting-item">
                <label>Debug Logs</label>
                <input type="checkbox" id="setting-debug">
              </div>
              <div class="setting-item">
                <label>Response Correlation Sensitivity</label>
                <input type="range" id="setting-sensitivity" min="0" max="100" value="50">
              </div>
              <div class="setting-item">
                <button id="btn-clear-history" class="btn danger">Clear All History</button>
              </div>
            </section>
          </div>
          <div class="modal-footer">
            <button id="save-settings" class="btn primary">Save Changes</button>
          </div>
        </div>
      </div>

      <!-- Editor Area -->
      <div class="editor-wrapper" id="editor-wrapper">
        <div id="editor" class="editor" contenteditable="true" spellcheck="false" placeholder="Waiting for AI response...">
        </div>
      </div>
    </main>
  </div>

  <script src="dexie.min.js"></script>
  <script src="html2pdf.bundle.min.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
